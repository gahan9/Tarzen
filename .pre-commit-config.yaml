# SPDX-License-Identifier: MIT
# Pre-commit hooks: run the same fast checks locally that CI enforces, so
# issues surface before a push. Install with `pre-commit install`.
# Update pinned revisions with `pre-commit autoupdate`.
minimum_pre_commit_version: "3.5.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: '(tsconfig.*\.json|\.firebase/)'
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        name: ruff (lint, backend)
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        name: ruff-format (backend)
        files: ^backend/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
